<title>Доступ по коду</title>

<style>
  :root{--bg:#EFF1F2;--card:#FFF;--ink:#171A1E;--muted:#5A6169;--line:#D8DCDF;--accent:#C77F02;--bad:#B3452F}
  @media (prefers-color-scheme: dark){:root{--bg:#14161A;--card:#1D2026;--ink:#ECEDEA;--muted:#9AA1A9;--line:#2C3138;--accent:#F2A81D;--bad:#E07B5F}}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--ink);font:16px/1.5 -apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif}
  form{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:28px 24px;width:min(92vw,340px);display:flex;flex-direction:column;gap:14px;text-align:center}
  .lock{font-size:34px}
  h1{font-size:17px;margin:0;font-weight:800}
  p{margin:0;color:var(--muted);font-size:13.5px}
  input{font:600 22px/1 inherit;letter-spacing:.35em;text-align:center;padding:12px;border:1.5px solid var(--line);border-radius:10px;background:transparent;color:var(--ink);width:100%}
  input:focus{outline:none;border-color:var(--accent)}
  button{font:700 15px inherit;padding:12px;border:none;border-radius:10px;background:var(--accent);color:#fff;cursor:pointer}
  button:disabled{opacity:.6}
  .err{color:var(--bad);font-size:13px;font-weight:700;min-height:18px;margin:0}
</style>
</head>

</form>

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function tryOpen(pw){
  const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:b64(P.salt), iterations:600000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b64(P.iv)}, key, b64(P.ct));
  const html = new TextDecoder().decode(pt);
  try{ localStorage.setItem('rz_k', pw); }catch(e){}
  document.open(); document.write(html); document.close();
}
const f = document.getElementById('f'), err = document.getElementById('err'),
      btn = document.getElementById('btn'), inp = document.getElementById('pw');
f.addEventListener('submit', async e => {
  e.preventDefault(); err.textContent=''; btn.disabled=true; btn.textContent='Открываю…';
  try{ await tryOpen(inp.value.trim()); }
  catch(x){ err.textContent='Неверный код'; btn.disabled=false; btn.textContent='Открыть'; inp.select(); }
});
(async()=>{ try{ const s = localStorage.getItem('rz_k'); if(s) await tryOpen(s); }catch(e){} })();
</script>
