  <style>

    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}

    .label{font:800 10px ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--gold);letter-spacing:.16em;text-transform:uppercase}

    button{width:100%;margin-top:10px;padding:14px;border:0;border-radius:11px;background:var(--gold);color:#111;font-weight:850;cursor:pointer}button:disabled{opacity:.6}.err{min-height:19px;margin:10px 0 0;color:var(--red);font-size:12px;font-weight:750;text-align:center}

    const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
    async function openPage(pw){
      const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
      const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(P.salt),iterations:600000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
      const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(P.iv)},key,b64(P.ct));
      const html=new TextDecoder().decode(pt);
      try{localStorage.setItem('gt_v2_k',pw)}catch(e){}
      document.open();document.write(html);document.close();
    }
    const f=document.getElementById('f'),inp=document.getElementById('pw'),btn=document.getElementById('btn'),err=document.getElementById('err');
    f.addEventListener('submit',async e=>{e.preventDefault();err.textContent='';btn.disabled=true;btn.textContent='Открываю…';try{await openPage(inp.value.trim())}catch(x){err.textContent='Неверный код';btn.disabled=false;btn.textContent='Открыть досье';inp.select()}});
    (async()=>{try{const saved=localStorage.getItem('gt_v2_k');if(saved)await openPage(saved)}catch(e){try{localStorage.removeItem('gt_v2_k')}catch(x){}}})();
  </script>
